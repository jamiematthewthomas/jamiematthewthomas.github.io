<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santander Cycles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 20px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Each card type has a distinct accent colour used for the header and icon. */
    .card.bike  .card-header { color: #e31837; }
    .card.ebike .card-header { color: #16a34a; }
    .card.space .card-header { color: #1a6fc4; }

    .card-name {
      font-size: 17px;
      font-weight: 600;
      color: #111;
      line-height: 1.3;
    }

    /*
     * Capacity bar: three coloured segments (standard bikes, e-bikes, empty spaces)
     * float left against a dark-grey background that represents bikes currently in use.
     */
    .cap-bar {
      height: 6px;
      background: #ebebeb;
      border-radius: 999px;
      overflow: hidden;
      display: flex;
      margin: 12px 0 10px;
    }

    .cap-seg { height: 100%; }

    .card-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #555;
    }

    .card-meta span strong {
      color: #111;
      font-weight: 700;
    }

    .card-distance {
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
    }

    .status {
      font-size: 15px;
      color: #888;
      text-align: center;
    }

    .retry-btn {
      margin-top: 16px;
      padding: 10px 24px;
      border: none;
      border-radius: 999px;
      background: #e31837;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .refresh-row {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .updated-time {
      font-size: 12px;
      color: #bbb;
    }

    .refresh-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Santander Cycles</h1>
  <div id="root"><p class="status">Finding your location…</p></div>

  <script>
    // TfL BikePoint — returns all ~800 Santander Cycles docking stations in London.
    // No API key is required for this endpoint.
    const TFL = "https://api.tfl.gov.uk/BikePoint";

    // Inline SVG icons sourced from Material Design Icons.
    const ICON = {
      bike:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>`,
      ebike: `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>`,
      space: `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 20h14v-2H5v2zm7-18v12.17l-3.59-3.58L7 12l5 5 5-5-1.41-1.41L13 14.17V2h-2z"/></svg>`,
    };

    // Returns the great-circle distance in metres between two lat/lon points.
    function haversineM(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // TfL returns dock properties as an array of {key, value} objects rather than
    // a plain object, so we need to find by key name each time.
    function prop(point, key) {
      const p = point.additionalProperties?.find(x => x.key === key);
      return p ? parseInt(p.value, 10) : 0;
    }

    function fmtDist(m) {
      return m < 1000 ? `${Math.round(m)}m away` : `${(m/1000).toFixed(1)}km away`;
    }

    function mapsLink(lat, lon, name) {
      return `https://maps.google.com/?q=${encodeURIComponent(name)}&ll=${lat},${lon}`;
    }

    function stationLink(p) {
      return `<a href="${mapsLink(p.lat, p.lon, p.name)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">${p.name}</a>`;
    }

    // Builds a segmented bar showing dock composition at a glance.
    // Red = standard bikes, green = e-bikes, light grey = empty spaces.
    // The dark grey bar background represents bikes currently out with riders.
    function capBar(p) {
      if (!p.docks) return '';
      const pct = n => `${(n / p.docks * 100).toFixed(1)}%`;
      return `<div class="cap-bar">
        <div class="cap-seg" style="width:${pct(p.stdBikes)};background:#e31837"></div>
        <div class="cap-seg" style="width:${pct(p.ebikes)};background:#16a34a"></div>
        <div class="cap-seg" style="width:${pct(p.spaces)};background:#d1d5db"></div>
      </div>`;
    }

    function bikeMeta(p) {
      return `
        <span><strong>${p.stdBikes}</strong> standard</span>
        <span><strong>${p.ebikes}</strong> e-bike${p.ebikes !== 1 ? 's' : ''}</span>
        <span><strong>${p.spaces}</strong> space${p.spaces !== 1 ? 's' : ''}</span>
      `;
    }

    function card(type, label, p) {
      return `
        <div class="card ${type}">
          <div class="card-header">${ICON[type]}<span class="card-label">${label}</span></div>
          <div class="card-name">${stationLink(p)}</div>
          ${capBar(p)}
          <div class="card-meta">${bikeMeta(p)}</div>
          <div class="card-distance">${fmtDist(p.dist)}</div>
        </div>
      `;
    }

    // The e-bike card is omitted entirely when no e-bikes are available anywhere.
    function renderCards(nearestBike, nearestEbike, nearestSpace, updatedAt) {
      document.getElementById("root").innerHTML = `
        <div class="cards">
          ${card('bike',  'Nearest bike', nearestBike)}
          ${nearestEbike ? card('ebike', 'Nearest e-bike', nearestEbike) : ''}
          ${card('space', 'Nearest free space', nearestSpace)}
        </div>
        <div class="refresh-row">
          <span class="updated-time">Updated ${updatedAt}</span>
          <button class="refresh-btn" onclick="init()">Refresh</button>
        </div>
      `;
    }

    function showError(msg) {
      document.getElementById("root").innerHTML = `
        <p class="status">${msg}</p>
        <div style="text-align:center">
          <button class="retry-btn" onclick="init()">Try again</button>
        </div>
      `;
    }

    async function init() {
      document.getElementById("root").innerHTML = `<p class="status">Finding your location…</p>`;

      // Step 1: get the user's current position via the Geolocation API.
      let userLat, userLon;
      try {
        const pos = await new Promise((res, rej) =>
          navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000 })
        );
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
      } catch {
        showError("Location access denied or unavailable.");
        return;
      }

      document.getElementById("root").innerHTML = `<p class="status">Loading dock data…</p>`;

      // Step 2: fetch all docking stations from TfL.
      let points;
      try {
        const res = await fetch(TFL);
        if (!res.ok) throw new Error();
        points = await res.json();
      } catch {
        showError("Couldn't load dock data. Check your connection.");
        return;
      }

      // Capture the fetch time before processing so the timestamp reflects when
      // the data was retrieved, not when rendering finished.
      const updatedAt = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      // Step 3: flatten each station into a plain object with the fields we need,
      // and calculate its distance from the user.
      const enriched = points.map(p => {
        const ebikes = prop(p, "NbEBikes");
        return {
          name: p.commonName.replace(/^Santander Cycles:\s*/i, ""),
          lat: p.lat,
          lon: p.lon,
          ebikes,
          stdBikes: prop(p, "NbStandardBikes"),
          spaces: prop(p, "NbEmptyDocks"),
          docks: prop(p, "NbDocks"),         // total dock capacity, used by the capacity bar
          dist: haversineM(userLat, userLon, p.lat, p.lon),
        };
      });

      // Step 4: build sorted shortlists for each card type.
      const withBikes  = enriched.filter(p => p.stdBikes > 0 || p.ebikes > 0).sort((a, b) => a.dist - b.dist);
      const withSpaces = enriched.filter(p => p.spaces  > 0).sort((a, b) => a.dist - b.dist);
      const withEbikes = enriched.filter(p => p.ebikes  > 0).sort((a, b) => a.dist - b.dist);

      if (!withBikes.length || !withSpaces.length) {
        showError("No docks with bikes or spaces found nearby.");
        return;
      }

      renderCards(withBikes[0], withEbikes[0] ?? null, withSpaces[0], updatedAt);
    }

    init();
  </script>
</body>
</html>
