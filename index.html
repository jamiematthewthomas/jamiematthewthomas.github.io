<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jamie Thomas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 20px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }

    .link-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .link-card:active {
      transform: scale(0.985);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .link-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #e31837;
      margin-bottom: 6px;
    }

    .link-title {
      font-size: 17px;
      font-weight: 600;
      color: #111;
    }

    .link-desc {
      font-size: 13px;
      color: #555;
      margin-top: 4px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #111; }
      h1 { color: #555; }
      .link-card { background: #1c1c1e; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
      .link-title { color: #ebebeb; }
      .link-desc { color: #888; }
    }
  </style>
</head>
<body>
  <h1>Jamie Thomas</h1>
  <div class="links">
    <a class="link-card" href="santandercycles.html">
      <div class="link-label">App</div>
      <div class="link-title">Santander Cycles</div>
      <div class="link-desc">Find the nearest docking station to your location</div>
    </a>
  </div>
</body>
</html>
