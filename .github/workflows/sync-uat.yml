name: Sync UAT

on:
  push:
    branches: [uat]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout uat
        uses: actions/checkout@v4
        with:
          ref: uat
          path: uat-src

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-dest

      - name: Sync uat/ directory on main
        run: |
          rm -rf main-dest/uat
          mkdir main-dest/uat
          # Copy everything except files that must stay root-only
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='CNAME' \
            --exclude='README.md' \
            --exclude='CLAUDE.md' \
            --exclude='uat' \
            uat-src/ main-dest/uat/

      - name: Commit and push to main
        run: |
          cd main-dest
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uat/
          git diff --staged --quiet || git commit -m "chore: sync uat/ from uat branch"
          git push
