<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jamie Thomas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 20px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }

    .link-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .link-card:active {
      transform: scale(0.985);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .link-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .link-text {
      flex: 1;
      min-width: 0;
    }

    .link-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .link-card.red .link-label {
      color: #e31837;
    }

    .link-card.blue .link-label {
      color: #0f298e;
    }

    .link-title {
      font-size: 17px;
      font-weight: 600;
      color: #111;
    }

    .link-desc {
      font-size: 13px;
      color: #555;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Jamie Thomas</h1>
  <div class="links">
    <a class="link-card red" href="santandercycles/index.html">
      <img class="link-icon" src="santandercycles/icon_with_border.svg" alt="" aria-hidden="true">
      <div class="link-text">
        <div class="link-label">App</div>
        <div class="link-title">Santander Cycles Bike/Dock Finder</div>
        <div class="link-desc">Find the nearest docking station to your location</div>
      </div>
    </a>
    <a class="link-card blue" href="flagfill/index.html">
      <img class="link-icon" src="flagfill/icon_with_border.svg" alt="" aria-hidden="true">
      <div class="link-text">
        <div class="link-label">Game</div>
        <div class="link-title">Flag Fill</div>
        <div class="link-desc">Guess the colour of a flag's missing section. Updates daily!</div>
      </div>
    </a>
  </div>
</body>
</html>
