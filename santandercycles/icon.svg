<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Map base -->
  <rect width="512" height="512" fill="#eee8da"/>

  <!-- Roads (horizontal: y=114, y=358 / vertical: x=112, x=362) -->
  <rect x="0"   y="114" width="512" height="28" fill="#d8d0be"/>
  <rect x="0"   y="358" width="512" height="28" fill="#d8d0be"/>
  <rect x="112" y="0"   width="18"  height="512" fill="#d8d0be"/>
  <rect x="362" y="0"   width="18"  height="512" fill="#d8d0be"/>

  <!-- Road centre dashes -->
  <line x1="0"   y1="128" x2="512" y2="128" stroke="white" stroke-width="2.5" stroke-dasharray="20,16" opacity="0.6"/>
  <line x1="0"   y1="372" x2="512" y2="372" stroke="white" stroke-width="2.5" stroke-dasharray="20,16" opacity="0.6"/>
  <line x1="121" y1="0"   x2="121" y2="512" stroke="white" stroke-width="2.5" stroke-dasharray="20,16" opacity="0.6"/>
  <line x1="371" y1="0"   x2="371" y2="512" stroke="white" stroke-width="2.5" stroke-dasharray="20,16" opacity="0.6"/>

  <!-- City blocks: top row -->
  <rect x="4"   y="4"   width="104" height="106" rx="5" fill="#e2dace"/>
  <rect x="134" y="4"   width="224" height="106" rx="5" fill="#e2dace"/>
  <rect x="382" y="4"   width="126" height="106" rx="5" fill="#e2dace"/>

  <!-- City blocks: middle row (left and right only — centre is clear) -->
  <rect x="4"   y="146" width="104" height="208" rx="5" fill="#e2dace"/>
  <rect x="382" y="146" width="126" height="208" rx="5" fill="#e2dace"/>

  <!-- City blocks: bottom row -->
  <rect x="4"   y="390" width="104" height="118" rx="5" fill="#e2dace"/>
  <rect x="134" y="390" width="224" height="118" rx="5" fill="#e2dace"/>
  <rect x="382" y="390" width="126" height="118" rx="5" fill="#e2dace"/>

  <!-- White circle centred on the map -->
  <circle cx="256" cy="256" r="150" fill="white"/>

  <!-- Bike icon (Material Design path, 24×24 viewBox scaled to fit the circle) -->
  <svg x="66" y="81" width="380" height="350" viewBox="0 0 24 24">
    <path fill="#e31837" d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/>
  </svg>

</svg>
