<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover is required for env(safe-area-inset-*) to take effect. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bike and Dock Finder</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon_without_border.svg" type="image/svg+xml">
  <meta name="theme-color" content="#e31837">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bike and Dock Finder">
  <link rel="apple-touch-icon" href="icon_with_border.svg">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <style>
    /* Colour tokens — overridden for dark mode below. */
    :root {
      --color-bike:     #e31837;
      --color-ebike:    #16a34a;
      --color-space:    #1a6fc4;

      --page-bg:        #f0f0f0;
      --card-bg:        #ffffff;
      --card-shadow:    0 1px 4px rgba(0,0,0,0.08);
      --text-primary:   #111111;
      --text-secondary: #555555;
      --text-muted:     #aaaaaa;
      --text-label:     #888888;
      --bar-bg:         #ebebeb;
      --skel-a:         #e8e8e8;
      --skel-b:         #f0f0f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page-bg:        #111111;
        --card-bg:        #1c1c1e;
        --card-shadow:    0 1px 4px rgba(0,0,0,0.4);
        --text-primary:   #ebebeb;
        --text-secondary: #888888;
        --text-muted:     #4a4a4a;
        --text-label:     #555555;
        --bar-bg:         #2c2c2e;
        --skel-a:         #2c2c2e;
        --skel-b:         #3a3a3c;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--page-bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Respect notch / Dynamic Island / home indicator on iOS. */
      padding: max(16px, env(safe-area-inset-top))
               max(8px,  env(safe-area-inset-right))
               max(16px, env(safe-area-inset-bottom))
               max(8px,  env(safe-area-inset-left));
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-label);
      margin-bottom: 12px;
    }

    /* #root grows to fill the remaining vertical space after the h1. When showing
     * the loading/error state the single child is centred inside it; when showing
     * cards the .cards flex child expands to fill the full height. */
    #root {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      flex: 1;
      width: 100%;
      max-width: 600px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      flex: 1;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--card-shadow);
      flex: 1;
      display: flex;
      flex-direction: column;
      /* Remove the default blue tap flash on mobile WebKit. */
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    /* Subtle press-down effect when the user taps a card. */
    .card:active {
      transform: scale(0.985);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Each card type has a distinct accent colour used for the header and icon. */
    .card.bike  .card-header { color: var(--color-bike); }
    .card.ebike .card-header { color: var(--color-ebike); }
    .card.space .card-header { color: var(--color-space); }

    .card-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    /*
     * Capacity bar: three coloured segments (standard bikes, e-bikes, empty spaces)
     * float left against a dark-grey background that represents bikes currently in use.
     */
    .cap-bar {
      height: 6px;
      background: var(--bar-bg);
      border-radius: 999px;
      overflow: hidden;
      display: flex;
      margin-top: 12px;
    }

    .cap-seg { height: 100%; }

    .card-meta {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      margin-top: auto;
      padding-top: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .card-meta > span:nth-child(1) { color: var(--color-bike); }
    .card-meta > span:nth-child(2) { color: var(--color-ebike); }
    .card-meta > span:nth-child(3) { color: var(--color-space); }

    .card-distance {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-body {
      display: flex;
      gap: 12px;
      align-items: stretch;
      flex: 1;
    }

    .card-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .card-map {
      position: relative;
      flex: 1;
      border-radius: 10px;
      overflow: hidden;
    }

    /* Transparent overlay that captures taps and opens Google Maps.
     * z-index 1000 sits above all Leaflet internal panes (max ~700). */
    .card-map-link {
      position: absolute;
      inset: 0;
      z-index: 1000;
    }

    /* Keep Leaflet's attribution legible but unobtrusive. */
    .leaflet-control-attribution {
      font-size: 8px !important;
      padding: 1px 4px !important;
      line-height: 1.3 !important;
    }

    .status {
      font-size: 15px;
      color: var(--text-label);
      text-align: center;
    }

    .retry-btn {
      margin-top: 16px;
      padding: 10px 24px;
      border: none;
      border-radius: 999px;
      background: var(--color-bike);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .refresh-row {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .updated-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .refresh-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-size: 16px;
      line-height: 1;
      vertical-align: middle;
      user-select: none;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
    }

    /* Skeleton shimmer for the loading state. */
    @keyframes shimmer {
      from { background-position: -600px 0; }
      to   { background-position:  600px 0; }
    }

    .skel {
      background: linear-gradient(90deg, var(--skel-a) 25%, var(--skel-b) 50%, var(--skel-a) 75%);
      background-size: 1200px 100%;
      animation: shimmer 1.5s infinite linear;
    }
  </style>
</head>
<body>
  <h1>Santander Cycles - Bike and Dock Finder</h1>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // TfL BikePoint — returns all ~800 Santander Cycles docking stations in London.
    // No API key is required for this endpoint.
    const TFL = "https://api.tfl.gov.uk/BikePoint";

    // Card header icons — Material Symbols Outlined loaded from Google Fonts.
    const ICON = {
      bike:  `<span class="material-symbols-outlined">pedal_bike</span>`,
      ebike: `<span class="material-symbols-outlined">electric_bike</span>`,
      space: `<span class="material-symbols-outlined">bike_dock</span>`,
    };

    // Use a dark CartoDB tile style when the OS is in dark mode so the map
    // matches the rest of the UI. Detected once at load time.
    const DARK_MODE = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const TILE_URL  = DARK_MODE
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';

    // Accent colours that match each card type's CSS colour.
    const cs = getComputedStyle(document.documentElement);
    const ACCENT = {
      bike:  cs.getPropertyValue('--color-bike').trim(),
      ebike: cs.getPropertyValue('--color-ebike').trim(),
      space: cs.getPropertyValue('--color-space').trim(),
    };

    // Track live Leaflet instances so they can be torn down before re-rendering.
    let activeMaps = [];

    // Returns the great-circle distance in metres between two lat/lon points.
    function haversineM(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // TfL returns dock properties as an array of {key, value} objects rather than
    // a plain object, so we need to find by key name each time.
    function prop(point, key) {
      const p = point.additionalProperties?.find(x => x.key === key);
      return p ? parseInt(p.value, 10) : 0;
    }

    function fmtDist(m) {
      return m < 1000 ? `${Math.round(m)}m away` : `${(m/1000).toFixed(1)}km away`;
    }

    function mapsLink(lat, lon, name) {
      return `https://maps.google.com/?q=${encodeURIComponent('Santander Cycles: ' + name)}&ll=${lat},${lon}`;
    }

    // Builds a segmented bar showing dock composition at a glance.
    // Red = standard bikes, green = e-bikes, light grey = empty spaces.
    // The dark grey bar background represents bikes currently out with riders.
    function capBar(p) {
      if (!p.docks) return '';
      const pct = n => `${(n / p.docks * 100).toFixed(1)}%`;
      return `<div class="cap-bar">
        <div class="cap-seg" style="width:${pct(p.stdBikes)};background:var(--color-bike)"></div>
        <div class="cap-seg" style="width:${pct(p.ebikes)};background:var(--color-ebike)"></div>
        <div class="cap-seg" style="width:${pct(p.spaces)};background:#d1d5db"></div>
      </div>`;
    }

    function bikeMeta(p) {
      return `
        <span>${ICON.bike} <strong>${p.stdBikes}</strong></span>
        <span>${ICON.ebike} <strong>${p.ebikes}</strong></span>
        <span>${ICON.space} <strong>${p.spaces}</strong></span>
      `;
    }

    function card(type, label, p) {
      return `
        <div class="card ${type}">
          <div class="card-body">
            <div class="card-content">
              <div class="card-header">${ICON[type]}<span class="card-label">${label}</span></div>
              <div class="card-name">${p.name}</div>
              <div class="card-distance">${fmtDist(p.dist)}</div>
              <div class="card-meta">${bikeMeta(p)}</div>
            </div>
            <div id="map-${type}" class="card-map">
              <a href="${mapsLink(p.lat, p.lon, p.name)}" target="_blank" rel="noopener" class="card-map-link"></a>
            </div>
          </div>
          ${capBar(p)}
        </div>
      `;
    }

    // Creates a small non-interactive Leaflet map centred on the dock with a
    // coloured dot marker. All interaction is disabled — it's purely decorative.
    function initMap(id, lat, lon, type) {
      const el = document.getElementById(id);
      if (!el) return;
      const map = L.map(el, {
        center: [lat, lon],
        zoom: 16,
        zoomControl: false,
        dragging: false,
        touchZoom: false,
        doubleClickZoom: false,
        scrollWheelZoom: false,
        boxZoom: false,
        keyboard: false,
      });
      L.tileLayer(TILE_URL, { maxZoom: 19 }).addTo(map);
      L.marker([lat, lon], {
        icon: L.divIcon({
          className: '',
          html: `<svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="6" fill="${ACCENT[type]}" stroke="white" stroke-width="2.5"/></svg>`,
          iconSize: [20, 20],
          iconAnchor: [10, 10],
        }),
      }).addTo(map);
      activeMaps.push(map);
    }

    // Renders three shimmering placeholder cards while location and dock data load.
    function showSkeleton() {
      activeMaps.forEach(m => m.remove());
      activeMaps = [];
      const skelCard = `
        <div class="card">
          <div class="card-body">
            <div class="card-content">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
                <div class="skel" style="width:16px;height:16px;border-radius:50%"></div>
                <div class="skel" style="width:90px;height:10px;border-radius:4px"></div>
              </div>
              <div class="skel" style="width:90%;height:18px;border-radius:4px"></div>
              <div class="skel" style="width:65%;height:18px;border-radius:4px;margin-top:6px"></div>
              <div class="skel" style="width:60px;height:12px;border-radius:4px;margin-top:10px"></div>
              <div style="display:flex;gap:16px;margin-top:auto;padding-top:8px">
                <div class="skel" style="width:40px;height:13px;border-radius:4px"></div>
                <div class="skel" style="width:40px;height:13px;border-radius:4px"></div>
                <div class="skel" style="width:40px;height:13px;border-radius:4px"></div>
              </div>
            </div>
            <div class="skel" style="flex:1;border-radius:10px"></div>
          </div>
          <div class="skel" style="height:6px;border-radius:999px;margin-top:10px"></div>
        </div>
      `;
      document.getElementById("root").innerHTML = `<div class="cards">${skelCard.repeat(3)}</div>`;
    }

    // The e-bike card is omitted entirely when no e-bikes are available anywhere.
    function renderCards(nearestBike, nearestEbike, nearestSpace, updatedAt) {
      activeMaps.forEach(m => m.remove());
      activeMaps = [];

      document.getElementById("root").innerHTML = `
        <div class="cards">
          ${card('bike',  'Nearest bike', nearestBike)}
          ${card('space', 'Nearest dock', nearestSpace)}
          ${nearestEbike ? card('ebike', 'Nearest e-bike', nearestEbike) : ''}
        </div>
        <div class="refresh-row">
          <span class="updated-time">Updated ${updatedAt}</span>
          <button class="refresh-btn" onclick="init()">Refresh</button>
        </div>
      `;

      initMap('map-bike',  nearestBike.lat,  nearestBike.lon,  'bike');
      if (nearestEbike) initMap('map-ebike', nearestEbike.lat, nearestEbike.lon, 'ebike');
      initMap('map-space', nearestSpace.lat, nearestSpace.lon, 'space');
    }

    function showError(msg) {
      activeMaps.forEach(m => m.remove());
      activeMaps = [];
      document.getElementById("root").innerHTML = `
        <p class="status">${msg}</p>
        <div style="text-align:center">
          <button class="retry-btn" onclick="init()">Try again</button>
        </div>
      `;
    }

    async function init() {
      showSkeleton();

      // Step 1: get the user's current position via the Geolocation API.
      let userLat, userLon;
      try {
        const pos = await new Promise((res, rej) =>
          navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000 })
        );
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
      } catch {
        showError("Location access denied or unavailable.");
        return;
      }

      // Step 2: fetch all docking stations from TfL.
      let points;
      try {
        const res = await fetch(TFL);
        if (!res.ok) throw new Error();
        points = await res.json();
      } catch {
        showError("Couldn't load dock data. Check your connection.");
        return;
      }

      // Capture the fetch time before processing so the timestamp reflects when
      // the data was retrieved, not when rendering finished.
      const updatedAt = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      // Step 3: flatten each station into a plain object with the fields we need,
      // and calculate its distance from the user.
      const enriched = points.map(p => {
        const ebikes = prop(p, "NbEBikes");
        return {
          name: p.commonName.replace(/^Santander Cycles:\s*/i, ""),
          lat: p.lat,
          lon: p.lon,
          ebikes,
          stdBikes: prop(p, "NbStandardBikes"),
          spaces: prop(p, "NbEmptyDocks"),
          docks: prop(p, "NbDocks"),         // total dock capacity, used by the capacity bar
          dist: haversineM(userLat, userLon, p.lat, p.lon),
        };
      });

      // Step 4: build sorted shortlists for each card type.
      const withBikes  = enriched.filter(p => p.stdBikes > 0 || p.ebikes > 0).sort((a, b) => a.dist - b.dist);
      const withSpaces = enriched.filter(p => p.spaces  > 0).sort((a, b) => a.dist - b.dist);
      const withEbikes = enriched.filter(p => p.ebikes  > 0).sort((a, b) => a.dist - b.dist);

      if (!withBikes.length || !withSpaces.length) {
        showError("No docks with bikes or spaces found nearby.");
        return;
      }

      renderCards(withBikes[0], withEbikes[0] ?? null, withSpaces[0], updatedAt);
    }

    init();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
